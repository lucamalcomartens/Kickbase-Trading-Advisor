name: Run Daily Predictions

permissions:
  contents: write

on:
  schedule:
    - cron: '30 21 * * *'  # Runs every day at 22:30 UTC
  workflow_dispatch:

jobs:
  run-daily-predictions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade google-generativeai
          pip install -r requirements.txt

      - name: Run daily_predictions.py
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          KICK_USER: ${{ secrets.KICK_USER }}
          KICK_PASS: ${{ secrets.KICK_PASS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          mkdir -p run_outputs
          mkdir -p reports
          set -o pipefail
          python daily_predictions.py 2>&1 | tee run_outputs/console.log

      - name: Commit report updates
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          if ! git diff --cached --quiet; then
            git commit -m "chore: update generated reports"
            git push
          fi

      - name: Append run summary
        if: always()
        run: |
          if [ -f run_outputs/last_run_summary.md ]; then
            cat run_outputs/last_run_summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kickadvisor-last-run
          path: |
            run_outputs/
            reports/
          if-no-files-found: warn
